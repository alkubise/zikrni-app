name: azkar_app
description: Azkar App - تطبيق أذكار متطور
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  provider: ^6.1.2
  firebase_core: ^4.7.0
  firebase_messaging: ^16.2.0
  firebase_auth: ^6.1.3
  cloud_firestore: ^6.1.2
  cloud_functions: ^6.2.0
  firebase_app_check: ^0.4.3
  google_sign_in: ^6.2.1

  http: ^1.2.1
  intl: ^0.20.2
  path: ^1.9.0
  path_provider: ^2.1.3
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^10.0.0
  flutter_dotenv: ^6.0.0
  url_launcher: ^6.3.0
  in_app_review: ^2.0.9
  package_info_plus: ^9.0.1
  timezone: ^0.11.0
  home_widget: ^0.9.1
  quran: ^1.4.1
  crypto: ^3.0.3

  google_maps_flutter: ^2.6.0
  geolocator: ^13.0.4
  flutter_qiblah: ^3.1.0

  adhan: ^2.0.0
  hijri: ^3.0.0

  audioplayers: ^6.6.0
  flutter_tts: ^4.0.2

  screenshot: ^3.0.0
  share_plus: ^12.0.2
  flutter_staggered_animations: ^1.1.1

  flutter_local_notifications: ^21.0.0
  android_alarm_manager_plus: ^5.0.0
  flutter_overlay_window: ^0.5.0

  sqflite: ^2.3.3
  weather: ^3.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/icon.png"

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/images/background_night.png
    - assets/images/background_day.png
    - assets/images/company_mark.png
    - assets/images/mosque_bg.png
    - assets/images/splash_background.png
    - assets/images/baga.png
    - assets/images/battle_bg.png
    - assets/images/hijra_bg.png
    - assets/images/mawlid_bg.png
    - assets/images/tree.png
    - assets/images/background_nightan.png
    - assets/images/icon.png
    - assets/icons/quran.png
    - assets/icons/azkar.png
    - assets/icons/hadith.png
    - assets/icons/dua.png
    - assets/icons/tasbih.png
    - assets/icons/sirah.png
    - assets/icons/morning.png
    - assets/icons/evening.png
    - assets/sounds/click.mp3

  fonts:
    - family: Amiri
      fonts:
        - asset: assets/fonts/Amiri-Bold.ttf

    - family: Tajawal
      fonts:
        - asset: assets/fonts/Tajawal-Regular.ttf
        - asset: assets/fonts/Tajawal-Bold.ttf
          weight: 700

    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700

    - family: ReemKufi
      fonts:
        - asset: assets/fonts/ReemKufi-Regular.ttf
